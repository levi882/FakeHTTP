name: OpenWrt

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Version Number
        type: string
        required: false
      create_release:
        description: Create draft release
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      version:
        description: Version Number
        type: string
        required: false
      create_release:
        description: Create draft release
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: openwrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    name: ${{ matrix.arch }} @ ${{ matrix.release }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      release_tag: ${{ steps.rel.outputs.tag }}
      release_name: ${{ steps.rel.outputs.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: 25.12.2
            sdk_tag: 25.12.2
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve version
        id: ver
        run: |
          VERSION='${{ inputs.version }}'
          if [ -z "$VERSION" ]; then
              VERSION="$(TZ=Asia/Shanghai date +%Y.%m.%d)~$(echo '${{ github.sha }}' | cut -c1-8)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate package version include
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          printf 'FAKEHTTP_PKG_VERSION:=%s\n' "${PKG_VERSION}" > version.mk

      - name: Resolve release metadata
        id: rel
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          SAFE_VERSION="$(printf '%s' "$VERSION" | sed 's/[^0-9A-Za-z._-]/-/g')"
          echo "tag=openwrt-${SAFE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=FakeHTTP OpenWrt ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build package
        uses: openwrt/gh-action-sdk@82c46b45db95e9e065293cc03724cca499dd2ddb
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk_tag }}
          FEEDNAME: fakehttp_feed
          PACKAGES: fakehttp luci-app-fakehttp luci-i18n-fakehttp-zh-cn
          NO_SHFMT_CHECK: 1
          V: s

      - name: Prepare artifact bundle
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          mapfile -t files < <(find bin/packages -type f -path "*/fakehttp_feed/*" \( -name "*fakehttp*.ipk" -o -name "*fakehttp*.apk" \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
              echo "No package artifacts found" >&2
              exit 1
          fi

          cp -f "${files[@]}" dist/

          (
              cd dist
              shopt -s nullglob
              files=( *.ipk *.apk )

              sha256sum "${files[@]}" > sha256sums.txt

              {
                  echo "name=fakehttp"
                  echo "version=${PKG_VERSION}"
                  echo "release=${{ matrix.release }}"
                  echo "arch=${{ matrix.arch }}"
                  echo "sdk_tag=${{ matrix.sdk_tag }}"
                  echo "commit=${{ github.sha }}"
                  echo "ref=${{ github.ref }}"
                  echo "built_at=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
                  echo
                  printf "%s\n" "${files[@]}"
              } > manifest.txt
          )

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: fakehttp-openwrt-${{ matrix.release }}-${{ matrix.arch }}
          path: |
            dist/*
          if-no-files-found: error

  Release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: Build
    if: |
      needs.Build.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.create_release) ||
        (github.event_name == 'workflow_call' && inputs.create_release)
      )
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        run: |
          set -euo pipefail

          mkdir -p release-dist
          mapfile -t files < <(find release-artifacts -type f \( -name '*.apk' -o -name '*.ipk' -o -name 'manifest.txt' -o -name 'sha256sums.txt' \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
              echo "No release assets found" >&2
              exit 1
          fi

          for file in "${files[@]}"; do
              base="$(basename "$file")"
              parent="$(basename "$(dirname "$file")")"
              target="release-dist/${parent}-${base}"

              cp -f "$file" "$target"
          done

          ls -l release-dist

      - name: Generate release notes
        env:
          PKG_VERSION: ${{ needs.Build.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          Automated draft release for FakeHTTP OpenWrt packages.

          Version: ${PKG_VERSION}
          Commit: ${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Assets:
          - fakehttp package
          - luci-app-fakehttp
          - luci-i18n-fakehttp-zh-cn
          - manifest.txt
          - sha256sums.txt
          EOF

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.Build.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.Build.outputs.release_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release upload "$RELEASE_TAG" release-dist/* --clobber
              gh release edit "$RELEASE_TAG" \
                  --draft \
                  --title "$RELEASE_NAME" \
                  --notes-file release-notes.md \
                  --target "${{ github.sha }}"
          else
              gh release create "$RELEASE_TAG" release-dist/* \
                  --draft \
                  --title "$RELEASE_NAME" \
                  --notes-file release-notes.md \
                  --target "${{ github.sha }}"
          fi
