name: OpenWrt

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Version Number
        type: string
        required: false
  workflow_call:
    inputs:
      version:
        description: Version Number
        type: string
        required: false

concurrency:
  group: openwrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    name: ${{ matrix.arch }} @ ${{ matrix.release }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: 25.12.2
            sdk_tag: 25.12.2
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve version
        id: ver
        run: |
          VERSION='${{ inputs.version }}'
          if [ -z "$VERSION" ]; then
              VERSION="$(TZ=Asia/Shanghai date +%Y.%m.%d)~$(echo '${{ github.sha }}' | cut -c1-8)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate package version include
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          printf 'FAKEHTTP_PKG_VERSION:=%s\n' "${PKG_VERSION}" > version.mk

      - name: Build package
        uses: openwrt/gh-action-sdk@82c46b45db95e9e065293cc03724cca499dd2ddb
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk_tag }}
          FEEDNAME: fakehttp_feed
          PACKAGES: fakehttp luci-app-fakehttp luci-i18n-fakehttp-zh-cn
          NO_SHFMT_CHECK: 1
          V: s

      - name: Prepare artifact bundle
        env:
          PKG_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          mapfile -t files < <(find bin/packages -type f -path "*/fakehttp_feed/*" \( -name "*fakehttp*.ipk" -o -name "*fakehttp*.apk" \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
              echo "No package artifacts found" >&2
              exit 1
          fi

          cp -f "${files[@]}" dist/

          (
              cd dist
              shopt -s nullglob
              files=( *.ipk *.apk )

              sha256sum "${files[@]}" > sha256sums.txt

              {
                  echo "name=fakehttp"
                  echo "version=${PKG_VERSION}"
                  echo "release=${{ matrix.release }}"
                  echo "arch=${{ matrix.arch }}"
                  echo "sdk_tag=${{ matrix.sdk_tag }}"
                  echo "commit=${{ github.sha }}"
                  echo "ref=${{ github.ref }}"
                  echo "built_at=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %z')"
                  echo
                  printf "%s\n" "${files[@]}"
              } > manifest.txt
          )

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: fakehttp-openwrt-${{ matrix.release }}-${{ matrix.arch }}
          path: |
            dist/*
          if-no-files-found: error
